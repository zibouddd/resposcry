name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Build CLI binaries
        run: cargo build -p reposcry-cli --bins
      - name: Fast index
        run: ./target/debug/reposcry index --no-semantic
      - name: Incremental update
        run: ./target/debug/reposcry-update --file README.md --skip-warm-calls
      - name: Refresh search
        run: ./target/debug/reposcry refresh-search --no-semantic
      - name: Validate
        run: ./target/debug/reposcry validate main
      - name: README smoke
        run: bash scripts/smoke-readme.sh
