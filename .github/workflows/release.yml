name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p reposcry-cli --target ${{ matrix.target }}
      - name: Package release (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/reposcry dist/reposcry
          tar -czf reposcry-${{ matrix.target }}.tar.gz -C dist reposcry
      - name: Package release (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/reposcry.exe dist/reposcry.exe
          Compress-Archive -Path dist/reposcry.exe -DestinationPath reposcry-${{ matrix.target }}.zip
      - name: Generate checksums
        shell: bash
        run: |
          if ls reposcry-${{ matrix.target }}.* 1> /dev/null 2>&1; then
            sha256sum reposcry-${{ matrix.target }}.* > reposcry-${{ matrix.target }}.sha256
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reposcry-${{ matrix.target }}
          path: |
            reposcry-${{ matrix.target }}.*
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reposcry-${{ matrix.target }}.*
